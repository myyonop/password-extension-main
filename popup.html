<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>PwGuard</title>

    <style>
      body {
        width: 280px;
        padding: 16px;

        font-family:
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;

        font-size: 14px;
        color: #222;
      }

      h2 {
        margin: 0 0 12px;

        font-size: 16px;
        color: #333;
      }

      input {
        width: 100%;

        padding: 8px;
        margin-bottom: 8px;

        border: 1px solid #ccc;
        border-radius: 6px;

        box-sizing: border-box;

        font-size: 14px;
      }

      button {
        width: 100%;

        padding: 9px;
        margin-bottom: 6px;

        border: none;
        border-radius: 6px;

        font-size: 14px;
        cursor: pointer;

        transition: opacity 0.2s;
      }

      button:hover {
        opacity: 0.9;
      }

      /* 로그인 버튼 */
      #login-btn {
        background: #4f8ef7;
        color: #fff;
      }

      /* 인증 메일 재전송 */
      #resend-btn {
        display: none;

        background: #f59e0b;
        color: #fff;
      }

      /* 로그아웃 버튼 */
      #logout-btn {
        background: #f55;
        color: #fff;
      }

      /* 로그인 성공 영역 */
      #success-section {
        display: none;
      }

      /* 이메일 표시 */
      #user-email {
        font-weight: bold;
        color: #4f8ef7;

        margin-bottom: 12px;

        word-break: break-all;
      }

      /* 상태 메시지 */
      #status-msg {
        font-size: 12px;
        color: #888;

        margin-top: 8px;

        min-height: 16px;

        line-height: 1.5;
      }

      /* 회원가입 링크 */
      #status-msg a {
        color: #10b981;
        text-decoration: none;
        font-weight: 600;
      }

      #status-msg a:hover {
        text-decoration: underline;
      }

      /* 안내 문구 */
      .info-text {
        font-size: 11px;
        color: #999;

        margin: 6px 0 0;

        line-height: 1.4;
      }
    </style>
  </head>

  <body>
    <h2>🔒 PwGuard</h2>

    <!-- 로그인 영역 -->
    <div id="auth-section">

      <!-- 이메일 -->
      <input
        type="email"
        id="email"
        placeholder="이메일"
      />

      <!-- 비밀번호 -->
      <input
        type="password"
        id="password"
        placeholder="비밀번호"
      />

      <!-- 로그인 -->
      <button id="login-btn">
        로그인
      </button>

      <!-- 인증 메일 재전송 -->
      <button id="resend-btn">
        인증 메일 재전송
      </button>

      <!-- 안내 -->
      <p class="info-text">
        ※ 회원가입 후 이메일 인증이 완료되어야
        로그인할 수 있습니다.
      </p>

      <!-- 상태 메시지 -->
      <div id="status-msg"></div>

    </div>

    <!-- 로그인 성공 영역 -->
    <div id="success-section">

      <!-- 사용자 이메일 -->
      <p id="user-email"></p>

      <!-- 설명 -->
      <p
        style="
          color:#555;
          font-size:13px;
          line-height:1.5;
        "
      >
        로그인 상태입니다.
        <br />
        비밀번호 입력창에서
        보안 분석이 자동으로 실행됩니다.
      </p>

      <!-- 로그아웃 -->
      <button id="logout-btn">
        로그아웃
      </button>

    </div>

    <!-- popup.js 연결 -->
    <script
      type="module"
      src="popup.js"
    ></script>
  </body>
</html>
